name: Deployment health check

on:
  schedule:
    - cron: "17 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deployment-health-check
  cancel-in-progress: true

jobs:
  check-portfolio:
    name: Check yahyasaadaoui.me
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check website availability
        env:
          HEALTH_URL: https://yahyasaadaoui.me
        run: |
          result=$(curl \
            --location \
            --silent \
            --show-error \
            --output /dev/null \
            --retry 3 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 30 \
            --write-out '%{http_code} %{time_total}' \
            "$HEALTH_URL")

          status=$(echo "$result" | cut -d' ' -f1)
          duration=$(echo "$result" | cut -d' ' -f2)

          {
            echo "## Deployment health check"
            echo ""
            echo "| URL | HTTP status | Response time |"
            echo "| --- | ---: | ---: |"
            echo "| $HEALTH_URL | $status | ${duration}s |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ ! "$status" =~ ^[23] ]]; then
            echo "Health check failed with HTTP status $status" >&2
            exit 1
          fi