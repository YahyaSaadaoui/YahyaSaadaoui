name: Reusable Repository Health

on:
  workflow_call:

permissions:
  contents: write

jobs:
  health:
    name: Repository health marker
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update health marker when state changes
        shell: bash
        run: |
          set -euo pipefail

          marker_path=".github/health/status.json"
          tmp_path="${marker_path}.tmp"
          mkdir -p "$(dirname "$marker_path")"

          missing=()
          require_file() {
            local pattern="$1"
            local label="$2"
            if ! find . -maxdepth 2 -iname "$pattern" -print -quit | grep -q .; then
              missing+=("$label")
            fi
          }

          require_file "README*" "README"
          require_file ".gitignore" "gitignore"

          tracked_files=$(git ls-files | wc -l | tr -d ' ')
          if [ "$tracked_files" -gt 0 ] && [ "${#missing[@]}" -eq 0 ]; then
            healthy=true
          else
            healthy=false
          fi

          missing_json=""
          for item in "${missing[@]}"; do
            escaped=${item//"/\\"}
            if [ -n "$missing_json" ]; then
              missing_json=", $missing_json"
            fi
            missing_json="\"$escaped\"$missing_json"
          done

          cat > "$tmp_path" <<JSON
          {
            "checked": true,
            "healthy": $healthy,
            "missing": [$missing_json],
            "note": "Updated automatically only when repository health state changes."
          }
          JSON

          {
            echo "## Repository health check"
            echo ""
            echo "- Repository: ${GITHUB_REPOSITORY}"
            echo "- Branch: ${GITHUB_REF_NAME}"
            echo "- Tracked files: ${tracked_files}"
            echo "- Healthy: ${healthy}"
            echo "- Missing: ${missing[*]:-none}"
            echo "- Checked at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f "$marker_path" ] && cmp -s "$tmp_path" "$marker_path"; then
            rm "$tmp_path"
            echo "Health marker unchanged. No commit needed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          mv "$tmp_path" "$marker_path"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$marker_path"
          git commit -m "Update repository health status"
          git push
